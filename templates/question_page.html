<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Recognition Interface</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f6f9;
        }
        .speech-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        #converted-text {
            min-height: 100px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .btn-custom {
            margin: 5px;
            min-width: 120px;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: #dc3545;
        }
        .status-indicator.active {
            background-color: #28a745;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row h-100 align-items-center justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-4">
                <div class="speech-container">
                    <h1 class="mb-4">{{ role }}</h1>
                    <h2 class="h4 mb-4">Question:</h2>
                    <p class="lead mb-5" id="question_text">{{ question }}</p>

                    <!-- Recording status indicator -->
                    <div class="mb-3">
                        <span class="status-indicator" id="status-indicator"></span>
                        <span id="status-text">Not recording</span>
                    </div>

                    <!-- Recording controls -->
                    <div class="mb-4">
                        <button id="start-recording" class="btn btn-danger btn-custom">Start Recording</button>
                        <button id="stop-recording" class="btn btn-warning btn-custom" disabled>Stop Recording</button>
                    </div>
                    
                    <div class="mb-4">
                        <form method="post" action="{{ url_for('user.quit_exam') }}">
                            <input type="hidden" name="role" value="{{ role }}">
                            <input type="submit" name="submit" value="Quit Exam" class="btn btn-danger">
                        </form>
                    </div>

                    <!-- Converted text display -->
                    <div id="converted-text" class="text-start"></div>

                    <!-- Hidden form to submit the answer -->
                    <form id="submit-answer-form" action="/submit_answer" method="post" class="mt-3">
                        <input type="hidden" name="question_id" value="{{ question_id }}" class="form-control">
                        <input type="hidden" name="role" value="{{ role }}" class="form-control">
                        <input type="hidden" name="user_answer" id="user_answer" class="form-control">
                        <button type="submit" id="submit-answer" class="btn btn-success btn-custom" disabled>Submit Answer</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Speech recognition variables
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        let interimTranscript = '';
        
        // DOM elements
        const startButton = document.getElementById('start-recording');
        const stopButton = document.getElementById('stop-recording');
        const submitButton = document.getElementById('submit-answer');
        const convertedTextDisplay = document.getElementById('converted-text');
        const userAnswerInput = document.getElementById('user_answer');
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');

        // Initialize speech recognition
        function initializeRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Your browser does not support speech recognition.');
                return false;
            }
            
            // Use the standard SpeechRecognition if available, otherwise fall back to webkitSpeechRecognition
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            // Configure recognition
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-IN'; // Indian English
            recognition.maxAlternatives = 1;
            
            // Set up event handlers
            recognition.onstart = handleRecognitionStart;
            recognition.onresult = handleRecognitionResult;
            recognition.onerror = handleRecognitionError;
            recognition.onend = handleRecognitionEnd;
            
            return true;
        }
        
        // Start recognition handler
        function handleRecognitionStart() {
            isRecording = true;
            startButton.disabled = true;
            stopButton.disabled = false;
            statusIndicator.classList.add('active');
            statusText.textContent = 'Recording...';
            console.log('Speech recognition started');
        }
        
        // Result handler
        function handleRecognitionResult(event) {
            interimTranscript = '';
            
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            
            // Update UI with transcribed text
            convertedTextDisplay.innerText = finalTranscript + interimTranscript;
            userAnswerInput.value = finalTranscript + interimTranscript;
            
            // Enable submit button if we have text
            submitButton.disabled = !(finalTranscript.trim() || interimTranscript.trim());
        }
        
        // Error handler
        function handleRecognitionError(event) {
            console.error('Speech recognition error:', event.error);
            
            let errorMessage = 'Speech recognition error';
            switch(event.error) {
                case 'no-speech':
                    errorMessage = 'No speech detected. Please try again.';
                    break;
                case 'audio-capture':
                    errorMessage = 'Microphone not working or not connected.';
                    break;
                case 'not-allowed':
                    errorMessage = 'Microphone permission denied. Please allow microphone access.';
                    break;
                case 'network':
                    errorMessage = 'Network error occurred. Please check your connection.';
                    break;
                case 'aborted':
                    errorMessage = 'Recognition aborted.';
                    break;
                default:
                    errorMessage = `Speech recognition error: ${event.error}`;
            }
            
            alert(errorMessage);
            resetRecording();
        }
        
        // End handler
        function handleRecognitionEnd() {
            console.log('Speech recognition ended');
            
            // Only restart if we're still supposed to be recording
            if (isRecording) {
                try {
                    // Wait a short time before restarting to avoid rapid cycling
                    setTimeout(() => {
                        if (isRecording) {
                            recognition.start();
                            console.log('Restarting speech recognition');
                        }
                    }, 500);
                } catch (error) {
                    console.error('Error restarting recognition:', error);
                    resetRecording();
                }
            }
        }
        
        // Reset recording state
        function resetRecording() {
            isRecording = false;
            startButton.disabled = false;
            stopButton.disabled = true;
            statusIndicator.classList.remove('active');
            statusText.textContent = 'Not recording';
        }
        
        // Start recording
        function startRecording() {
            if (isRecording) return;
            
            // Clear previous transcript
            finalTranscript = '';
            interimTranscript = '';
            convertedTextDisplay.innerText = '';
            userAnswerInput.value = '';
            submitButton.disabled = true;
            
            // Initialize recognition if not already done
            if (!recognition) {
                if (!initializeRecognition()) return;
            }
            
            // Start recognition
            try {
                recognition.start();
            } catch (error) {
                console.error('Error starting recognition:', error);
                alert('Error starting speech recognition. Please refresh the page and try again.');
            }
        }
        
        // Stop recording
        function stopRecording() {
            if (!isRecording) return;
            
            isRecording = false;
            try {
                recognition.stop();
            } catch (error) {
                console.error('Error stopping recognition:', error);
            }
            resetRecording();
        }
        
        // Set up event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize recognition
            initializeRecognition();
            
            // Button event listeners
            startButton.addEventListener('click', startRecording);
            stopButton.addEventListener('click', stopRecording);
            
            // Reset form on page load
            if (document.getElementById('message')) {
                document.getElementById('message').innerText = '';
            }
        });
    </script>
</body>
</html>
