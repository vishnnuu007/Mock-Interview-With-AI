{% include 'admin_header.html' %}

<style>
    body {
        background: url('/static/b03df4f90386cc64c3b810054d43016e.jpg') no-repeat center center fixed;
        background-size: cover;
    }
    .blur-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(10px);
        z-index: -1;
    }
    .container {
        background: rgba(255, 255, 255, 0.8);
        padding: 10px;
        border-radius: 10px;
    }
</style>

<div class="blur-bg"></div>

<center style="margin-top: 10%;">
    <div class="container">
        <table border="2" class="table table-bordered border-primary">
            <tr class="table-primary">
                <th>FIRSTNAME</th>
                <th>LASTNAME</th>
                <th>PLACE</th>
                <th>PHONE</th>
                <th>EMAIL</th>
            </tr>
            {% for i in data['view'] %}
            <tr>
                <td>{{ i['fname'] }}</td>
                <td>{{ i['lname'] }}</td>
                <td>{{ i['place'] }}</td>
                <td>{{ i['phone'] }}</td>
                <td>{{ i['email'] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</center>
<br><br><br><br><br><br><br><br><br><br><br><br><br><br>
