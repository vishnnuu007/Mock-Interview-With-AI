<style>

    align-items: center;
    z-index: 2000;
}

.scanning-content {
    background: #fff;
    padding: 30px;
    border-radius: 15px;

    border: none;
    cursor: pointer;
    margin-top: 15px;
    transition: background-color 0.3s;
}

    background-color: #0056b3;
}
