{% include 'user_header.html' %}

<style>
    body {
        background: url('/static/706e8c2272f678808a06897934696f20.jpg') no-repeat center center fixed;
        background-size: cover;
        margin: 0; /* Remove default margin */
        height: 100vh; /* Full viewport height */
        display: flex; /* Use Flexbox for centering */
        justify-content: center; /* Horizontal centering */
        align-items: center; /* Vertical centering */
        position: relative;
    }

    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.2); /* Light overlay */
        backdrop-filter: blur(10px); /* Blur effect */
        -webkit-backdrop-filter: blur(10px);
        z-index: -1; /* Behind content */
    }

    .container1 {
        background: rgba(255, 255, 255, 0.3); /* Light background for readability */
        padding: 20px;
        border-radius: 10px;
        text-align: center; /* Center text inside container1 */
        z-index: 1; /* Above overlay */
        width: 100%;
        max-width: 500px; /* Limit width for better readability */
    }

    .sel {
        display: block;
        width: 100%; /* Full width of container1 for consistency */
        max-width: 200px; /* Optional: Limit select width */
        height: 34px;
        padding: 6px 12px;
        font-size: 14px;
        line-height: 1.42857143;
        color: #555;
        background-color: #fff;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.075);
        transition: border-color ease-in-out 0.15s, box-shadow ease-in-out 0.15s;
        margin: 10px auto; /* Center the select and add spacing */
    }

    #waitMessage {
        display: none;
        margin-top: 20px;
    }

    .btn-success {
        margin-top: 20px; /* Add spacing above button */
    }
</style>

<div class="container1">
    <h3>Select Role for Interview</h3>
    <form id="interviewForm" action="/start_interview" method="post" onsubmit="showWaitMessage()">
        <label for="role"><h5>Role:</h5></label>
        <select name="role" id="role" class="sel" required>
            <option value="">Select</option>
            {% for i in r %}
                <option value="{{i.role_name}}">{{i.role_name}}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-success">Start Interview</button>
    </form>

    <div id="waitMessage">
        <h4>Please wait for the generation to complete...</h4>
    </div>
</div>

<br><br><br><br><br>


<script>
    function showWaitMessage() {
        document.getElementById('waitMessage').style.display = 'block';
    }
</script>
