{% include 'admin_header.html' %}

<style>
    /* Import a stylish Google Font */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    body {
        background: url('/static/5819084e975ec9798abc578c50dfc207.jpg') no-repeat center center fixed;
        background-size: cover;
        position: relative;
        flex: 1;
        font-family: 'Poppins', sans-serif; /* Modern, elegant font */
    }

    /* Blur effect with animation */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: inherit;
        filter: blur(20px);
        animation: blurFade 3s ease-in-out forwards;
        z-index: -1;
    }

    @keyframes blurFade {
        0% {
            filter: blur(20px);
            opacity: 0.5;
        }
        100% {
            filter: blur(5px);
            opacity: 1;
        }
    }

    /* Container for centered content */
    .container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    /* Stylish content box */
    .content-box {
        color: white;
        text-align: center;
        padding: 40px;
        background: rgba(0, 0, 0, 0.4); /* Semi-transparent backdrop */
        backdrop-filter: blur(8px); /* Additional blur for glass effect */
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        animation: slideUp 1.5s ease-out forwards;
        transform: translateY(50px); /* Start slightly below */
    }

    @keyframes slideUp {
        0% {
            opacity: 0;
            transform: translateY(50px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Enhanced h1 styling with hover effect */
    .content-box h1 {
        font-size: 3rem; /* Larger text */
        font-weight: 600; /* Bold but elegant */
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
        background: linear-gradient(90deg, #ffffff, #a8d5ff); /* Gradient text */
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        transition: transform 0.3s ease, text-shadow 0.3s ease;
    }

    .content-box h1:hover {
        transform: scale(1.05); /* Slight zoom on hover */
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); /* Glow effect */
    }

    /* Animated underline effect */
    .content-box h1::after {
        content: '';
        display: block;
        width: 0;
        height: 3px;
        background: #a8d5ff;
        margin: 10px auto 0;
        transition: width 0.5s ease;
    }

    .content-box h1:hover::after {
        width: 50%; /* Expands underline on hover */
    }

    /* Footer styling */
    footer {
        text-align: center;
        padding: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        font-size: 0.9rem;
        font-weight: 300;
        position: relative;
        width: 100%;
        animation: fadeInFooter 2s ease-in-out forwards;
    }

    @keyframes fadeInFooter {
        0% {
            opacity: 0;
            transform: translateY(20px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<body>
    <div class="container">
        <div class="content-box">
            <h1>Welcome Admin</h1>
        </div>
    </div>
</body>
